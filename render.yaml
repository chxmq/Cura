# Cura — production Render Blueprint
# Deploy: Render Dashboard → New → Blueprint → connect this repo

services:
  # ── Backend API ──────────────────────────────────────────────────────────
  - type: web
    name: cura-api
    runtime: node
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: npm ci
    startCommand: node src/server.js
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - backend/**
        - datasets/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5050
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        fromService:
          name: cura-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: LIVEAVATAR_API_KEY
        sync: false
      - key: LIVEAVATAR_AVATAR_ID
        sync: false

  # ── Frontend SPA ─────────────────────────────────────────────────────────
  - type: web
    name: cura-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - frontend/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: cura-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
