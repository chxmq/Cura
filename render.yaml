services:
  # ── Backend API ──────────────────────────────────────────────────────────
  - type: web
    name: cura-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5050
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: LIVEAVATAR_API_KEY
        sync: false
      - key: LIVEAVATAR_AVATAR_ID
        sync: false

  # ── Frontend SPA ─────────────────────────────────────────────────────────
  - type: web
    name: cura-web
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://cura-api.onrender.com/api
